<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage all booked sessions at Séance Studio. View, edit, and delete bookings.">
    <title>Séance Studio — Manage Sessions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-particles">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <nav class="nav-bar">
        <a href="clients.html" class="nav-brand"> Séance Studio</a>
        <ul class="nav-links">
            <li><a href="clients.html"> Dashboard</a></li>
            <li><a href="#" id="logoutBtn" class="nav-logout"> Logout</a></li>
        </ul>
    </nav>
    <div class="page-container with-nav">
        <div class="glass-card extra-wide">
            <div class="page-header">
                <div class="page-header-left">
                    <h1 class="card-title">Manage Sessions</h1>
                    <p class="card-subtitle">View and update your bookings</p>
                </div>
                <div>
                    <a href="booking.html" class="btn btn-primary" style="width:auto;">
                         Book New Session
                    </a>
                </div>
            </div>
            <div class="form-group mb-3">
                <input type="text" id="sessionSearch" class="form-control" placeholder=" Search sessions by client name or service...">
            </div>
            <div class="table-wrapper">
                <table class="client-table">
                    <thead>
                        <tr>
                            <th>Client</th>
                            <th>Service</th>
                            <th>Date & Time</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sessionsTableBody">
                    </tbody>
                </table>
            </div>
            <div class="form-footer mt-3">
                <a href="clients.html"> Back to Dashboard</a>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="editSessionModal">
        <div class="modal-content">
            <button class="modal-close" id="closeSessionModal">&times;</button>
            <h2 class="card-title" style="font-size:1.5rem;">Edit Session</h2>
            <p class="card-subtitle">Update booking details</p>
            <form id="editSessionForm" autocomplete="off">
                <input type="hidden" id="editSessionId">
                <div class="form-group">
                    <label for="editSessionService">Service</label>
                    <select id="editSessionService" class="form-control" required>
                        <option value="Eyebrows">Eyebrows</option>
                        <option value="Nails">Nails</option>
                        <option value="Makeup">Makeup</option>
                        <option value="Haircut">Haircut</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="session-info">
                    <div class="form-group">
                        <label for="editSessionDate">Date</label>
                        <input type="date" id="editSessionDate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="editSessionTime">Time</label>
                        <input type="time" id="editSessionTime" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editSessionPrice">Price ($)</label>
                    <input type="number" id="editSessionPrice" class="form-control" step="0.01">
                </div>
                <div class="form-group">
                    <label for="editSessionDescription">Description</label>
                    <textarea id="editSessionDescription" class="form-control"></textarea>
                </div>
                <div style="display:flex; gap:12px;">
                    <button type="submit" class="btn btn-primary" style="flex:1;">
                         Save Changes
                    </button>
                    <button type="button" class="btn btn-outline modal-close">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
