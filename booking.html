<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book a séance session. Select a client, services, and set the details.">
    <title>Séance Studio — Book a Session</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .service-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: flex-end;
            animation: cardPopIn 0.4s ease-out forwards;
        }
        .remove-service {
            padding: 12px;
            color: var(--rose);
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .remove-service:hover {
            color: var(--gold);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="bg-particles">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <nav class="nav-bar">
        <a href="clients.html" class="nav-brand"> Séance Studio</a>
        <ul class="nav-links">
            <li><a href="clients.html"> Dashboard</a></li>
            <li><a href="#" id="logoutBtn" class="nav-logout"> Logout</a></li>
        </ul>
    </nav>
    <div class="page-container with-nav">
        <div class="glass-card" style="max-width: 700px;">
            <h1 class="card-title">Book a Session</h1>
            <p class="card-subtitle">Select your client and add services for today</p>
            <div class="divider"><span></span></div>
            <form id="bookingForm" autocomplete="off">
                <div class="session-info">
                    <div class="form-group" style="flex: 2;">
                        <label for="bookingClient">Client <span style="color: var(--rose);">*</span></label>
                        <select id="bookingClient" class="form-control" required>
                            <option value="">— Select a Client —</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="bookingDate">Date <span style="color: var(--rose);">*</span></label>
                        <input type="date" id="bookingDate" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="bookingTime">Time <span style="color: var(--rose);">*</span></label>
                        <input type="time" id="bookingTime" class="form-control" required>
                    </div>
                </div>
                <div class="divider" style="margin: 10px 0 20px 0;"><span>Services</span></div>
                <div id="servicesContainer">
                    <div class="service-row">
                        <div class="form-group" style="flex: 2; margin-bottom: 0;">
                            <label>Service</label>
                            <select class="form-control service-select" required>
                                <option value="">— Select Service —</option>
                                <option value="Eyebrows">Eyebrows</option>
                                <option value="Nails">Nails</option>
                                <option value="Makeup">Makeup</option>
                                <option value="Haircut">Haircut</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label>Price ($)</label>
                            <input type="number" class="form-control service-price" placeholder="0.00" step="0.01" required>
                        </div>
                        <div style="width: 40px;"></div> 
                    </div>
                </div>
                <div style="margin-bottom: 24px;">
                    <button type="button" id="addServiceBtn" class="btn btn-outline btn-sm" style="width: auto;">
                        ＋ Add Another Service
                    </button>
                </div>
                <div class="form-group">
                    <label for="bookingDescription">Session Notes / Description</label>
                    <textarea id="bookingDescription" class="form-control" placeholder="Any details for this entire session..."></textarea>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 10px;">
                    <button type="submit" id="bookingBtn" class="btn btn-rose" style="flex: 2;">
                         Book Session
                    </button>
                    <a href="manage-sessions.html" class="btn btn-outline" style="flex: 1;">
                         Manage
                    </a>
                </div>
                <div class="form-footer mt-4" style="text-align: center;">
                    <a href="clients.html" style="color: var(--text-muted); font-size: 0.9rem;"> Back to Dashboard</a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
